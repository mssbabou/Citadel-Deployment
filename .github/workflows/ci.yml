name: Test and Release

on:
  push:
    branches: [dotnet-server]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run tests
        run: dotnet test server/CitadelServer.sln --logger "console;verbosity=normal"

  release:
    name: Create release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build self-contained binary
        run: |
          dotnet publish server/CitadelServer \
            -r linux-x64 \
            --self-contained \
            -p:PublishSingleFile=true \
            -c Release

      - name: Get next release number
        id: release_number
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const next = releases.data.length + 1;
            core.setOutput('number', next);
            core.setOutput('tag', `v${next}`);

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ steps.release_number.outputs.tag }}';
            const number = '${{ steps.release_number.outputs.number }}';

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${number}`,
              body: `Automated release from commit ${context.sha.slice(0, 7)}.\n\n**Files:**\n- \`install-server.sh\` — installer/updater for the deploy server (run with sudo, safe to re-run)\n- \`deploy-server\` — self-contained Linux x64 binary (used by install-server.sh)\n- \`deploy.sh\` — Linux/macOS client\n- \`deploy.bat\` — Windows client\n- \`.env.example\` — configuration template\n\nSee README.md for setup instructions.`,
              draft: false,
              prerelease: false,
            });

            const assets = [
              { path: 'server/CitadelServer/bin/Release/net10.0/linux-x64/publish/deploy-server', name: 'deploy-server',     type: 'application/octet-stream' },
              { path: 'install-server.sh',                                                         name: 'install-server.sh', type: 'text/x-sh' },
              { path: 'deploy.sh',                                                                 name: 'deploy.sh',         type: 'text/x-sh' },
              { path: 'deploy.bat',                                                                name: 'deploy.bat',        type: 'text/plain' },
              { path: '.env.example',                                                              name: '.env.example',      type: 'text/plain' },
              { path: 'config.toml.example',                                                       name: 'config.toml.example', type: 'text/plain' },
            ];

            for (const asset of assets) {
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: asset.name,
                data: fs.readFileSync(asset.path),
                headers: { 'content-type': asset.type },
              });
            }

            console.log(`Created release: ${release.data.html_url}`);
