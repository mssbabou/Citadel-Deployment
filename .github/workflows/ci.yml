name: Test and Release

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v

  release:
    name: Create release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get next release number
        id: release_number
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const next = releases.data.length + 1;
            core.setOutput('number', next);
            core.setOutput('tag', `v${next}`);

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ steps.release_number.outputs.tag }}';
            const number = '${{ steps.release_number.outputs.number }}';

            // Create the release
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${number}`,
              body: `Automated release from commit ${context.sha.slice(0, 7)}.\n\n**Files:**\n- \`deploy-server.py\` — run on the target Linux server\n- \`deploy.sh\` — Linux/macOS client\n- \`deploy.bat\` — Windows client\n- \`.env.example\` — configuration template\n\nSee README.md for setup instructions.`,
              draft: false,
              prerelease: false,
            });

            // Upload assets
            const assets = [
              { path: 'deploy-server.py', name: 'deploy-server.py', type: 'text/x-python' },
              { path: 'deploy.sh',        name: 'deploy.sh',        type: 'text/x-sh' },
              { path: 'deploy.bat',       name: 'deploy.bat',       type: 'text/plain' },
              { path: '.env.example',     name: '.env.example',     type: 'text/plain' },
            ];

            for (const asset of assets) {
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: asset.name,
                data: fs.readFileSync(asset.path),
                headers: { 'content-type': asset.type },
              });
            }

            console.log(`Created release: ${release.data.html_url}`);
